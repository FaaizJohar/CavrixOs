[options]
HoldPkg     = pacman glibc
Architecture = auto

# Pacman optimization
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 5
ILoveCandy

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Official repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# CavrixOS Repository (Local for ISO build)
[cavrixos]
SigLevel = Optional TrustAll
Server = file:///tmp/cavrixos-build/cavrixos-repo

[options]
HoldPkg     = pacman glibc
Architecture = auto

# Pacman optimization
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 5
ILoveCandy

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Official repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# CavrixOS Local Repositories (For ISO build)
[cavrix-core]
SigLevel = Optional TrustAll
Server = file:///workspace/repositories/cavrix-core

[cavrix-ai]
SigLevel = Optional TrustAll
Server = file:///workspace/repositories/cavrix-ai

[cavrix-extra]
SigLevel = Optional TrustAll
Server = file:///workspace/repositories/cavrix-extra

name: Code Quality CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          pip install flake8
          
      - name: Lint Bash Scripts (Shellcheck)
        run: |
          echo "Running Shellcheck on all .sh files..."
          find . -type f -name "*.sh" -not -path "*/\.*" -exec shellcheck -x {} +
          
      - name: Lint Python Code (Flake8)
        run: |
          echo "Running Flake8 on all .py files..."
          # E501: line too long (ignore for now)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Validate JSON Files
        run: |
          echo "Validating JSON syntax..."
          find . -type f -name "*.json" -not -path "*/\.*" -exec python -m json.tool {} >/dev/null \;

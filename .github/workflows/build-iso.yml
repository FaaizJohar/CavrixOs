name: Build ISO

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Packages, Repo, and ISO in Arch Container
      run: |
        docker run --privileged -v ${{ github.workspace }}:/workspace -w /workspace archlinux:base-devel bash -c "pacman-key --init && pacman --noconfirm -Sy archlinux-keyring && pacman --noconfirm -S archiso git make sudo && useradd -m builduser && echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers && chown -R builduser:builduser /workspace && su builduser -c 'make packages repo' && make iso" > build.log 2>&1 || (cat build.log && exit 1)

    - name: Commit build log
      if: failure()
      run: |
        git config --global user.email "bot@cavrixos.org"
        git config --global user.name "Bot"
        git switch -c build-logs
        git add build.log
        git commit -m "build failed"
        git push -f https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git build-logs


    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CavrixOS-Live-ISO
        path: build/*.iso

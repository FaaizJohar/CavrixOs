name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged
    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        pacman-key --init
        pacman --noconfirm -Sy archlinux-keyring
        pacman --noconfirm -S archiso base-devel git make

    - name: Build Packages and Repo
      run: make repo

    - name: Build ISO
      run: make iso

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/*.iso
          build/SHA256SUMS

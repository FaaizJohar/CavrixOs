name: CavrixOS Master Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Pacman Packages
        uses: actions/cache@v3
        with:
          path: /var/cache/pacman/pkg
          key: pacman-cache-${{ hashFiles('**/PKGBUILD') }}
          restore-keys: |
            pacman-cache-

      - name: Build ISO in Arch Container
        run: |
          docker run --privileged \
            -v ${{ github.workspace }}:/workspace \
            -v /var/cache/pacman/pkg:/var/cache/pacman/pkg \
            -w /workspace \
            archlinux:base-devel \
            bash -c "
              pacman-key --init && \
              pacman --noconfirm -Sy archlinux-keyring reflector && \
              reflector --latest 10 --sort rate --save /etc/pacman.d/mirrorlist && \
              pacman --noconfirm -S archiso git make sudo grub syslinux mtools dosfstools edk2-ovmf jq python-pytest && \
              sed -i 's/^#MAKEFLAGS=\"-j2\"/MAKEFLAGS=\"-j$(nproc)\"/' /etc/makepkg.conf && \
              sed -i 's/COMPRESSZST=(zstd -c -z -q -)/COMPRESSZST=(zstd -c -z -q -T0 -)/' /etc/makepkg.conf && \
              useradd -m builduser && \
              echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers && \
              chown -R builduser:builduser /workspace && \
              chmod +x /workspace/ci/scripts/mock-gpg.sh && \
              /workspace/ci/scripts/mock-gpg.sh && \
              cd /workspace && \
              pytest testing/tests/ && \
              su builduser -c 'make packages' && \
              make repo && \
              make iso
            " > build.log 2>&1

      - name: Commit Build Logs
        if: always()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git checkout -b debug-logs-$GITHUB_RUN_ID
          cp build.log build_debug.log || true
          git add build_debug.log || true
          git commit -m "chore(debug): upload raw build logs [skip ci]" || true
          git push origin debug-logs-$GITHUB_RUN_ID || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.iso
          name: CavrixOS Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

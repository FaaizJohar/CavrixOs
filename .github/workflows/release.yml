name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Packages, Repo, and ISO in Arch Container
        run: |
          docker run --privileged -v ${{ github.workspace }}:/workspace -w /workspace archlinux:base-devel bash -c "pacman-key --init && pacman --noconfirm -Sy archlinux-keyring && pacman --noconfirm -S archiso git make sudo && sed -i 's/EUID == 0/EUID == 9999/' /usr/bin/makepkg && make all"

      - name: Create Release and Upload ISO
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.iso
          name: Cavrix AI Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
